# 统一 Docker 日志 rotation：每容器最多 3 个 10MB 文件，防 json-file 日志无限增长
# （主应用已全面 print→logger 走 stdout，日志量较大，rotation 尤为必要）
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  agentsstock:
    build:
      context: .
      dockerfile: Dockerfile
    image: aiagents-stock-app
    container_name: agentsstock1
    logging: *default-logging
    ports:
      - "8503:8503"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      # route B：tdx-api 下载的本地K线库（只读），网关第0级最高优先级数据源
      - ./tdx-data:/app/tdx-data:ro
    environment:
      - TZ=Asia/Shanghai
      - LOCAL_DB_DIR=/app/tdx-data/database/kline
    restart: unless-stopped
    depends_on:
      tdx-stock-web:
        condition: service_healthy
      aktools:
        condition: service_healthy
    networks:
      - agentsstock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8503/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # AKTools 数据网关（降级链第2级）：复用主应用镜像，仅覆盖启动命令
  # 容器内无代理变量，A股境内接口走直连；主应用经内网 http://aktools:8088 访问
  aktools:
    image: aiagents-stock-app
    container_name: aktools
    logging: *default-logging
    command: ["python", "-m", "aktools", "--host", "0.0.0.0", "--port", "8088"]
    ports:
      - "8088:8088"
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - agentsstock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tdx-stock-web:
    build:
      context: ./tdx-api
      dockerfile: Dockerfile
    container_name: tdx-stock-web
    logging: *default-logging
    ports:
      - "8080:8080"
    volumes:
      # 持久化下载的本地K线/代码库（codes.db、workday.db、database/kline），避免重建丢失
      - ./tdx-data:/app/data
    environment:
      - TZ=Asia/Shanghai
    # tdx-stock-web 启动需 ~70s(连通达信服务器+加载5万+股票代码)；Dockerfile 内
    # start-period=5s 过短，会在启动期就把它判为 unhealthy，进而门控住依赖它
    # (condition: service_healthy) 的主应用 agentsstock 与 chanlun-updater，导致
    # 单次 `docker compose up` 以 "dependency failed to start" 中止。此处覆盖：
    # start_period 90s 覆盖正常启动窗口，使整栈一次性可靠拉起。
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - agentsstock-network

  # 定时增量更新本地K线：每天18:00触发 tdx-stock-web 的 pull-kline（引擎层本身增量）
  # 轻量 alpine + busybox crond，不改 Go 代码/主应用镜像。日志写宿主机 ./tdx-data/update.log
  kline-updater:
    build: ./scheduler
    container_name: kline-updater
    logging: *default-logging
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./tdx-data:/data          # update.sh 写 /data/update.log、crond 写 /data/cron.out
    restart: unless-stopped
    depends_on:
      tdx-stock-web:
        condition: service_started
    networks:
      - agentsstock-network

  # 缠论信号每日自动重算 sidecar：复用主应用镜像（含 python 与缠论模块），
  # 每天 20:00（kline-updater 18:00 增量更新完成之后）跑 chanlun_batch，
  # 把全市场近7交易日买点重算落库到 data/chanlun_signals.db，供「缠论选股」页只读。
  # 仅挂卷+改启动命令，不单独构建镜像（与 aktools 同思路）。
  chanlun-updater:
    image: aiagents-stock-app
    container_name: chanlun-updater
    logging: *default-logging
    command: ["sh", "/app/chanlun_schedule.sh"]
    environment:
      - TZ=Asia/Shanghai
      - LOCAL_DB_DIR=/app/tdx-data/database/kline
      - CHANLUN_RUN_AT=20:00
    volumes:
      - ./data:/app/data                 # 写 chanlun_signals.db / chanlun_update.log
      - ./.env:/app/.env                 # 网关初始化读 API 配置（与主应用一致）
      - ./tdx-data:/app/tdx-data:ro      # 只读本地K线（route B 数据源）
      - ./chanlun_schedule.sh:/app/chanlun_schedule.sh:ro
    # 本容器不跑 streamlit，禁用镜像继承的 8503 健康检查（否则恒为 unhealthy）
    healthcheck:
      disable: true
    restart: unless-stopped
    depends_on:
      tdx-stock-web:
        condition: service_healthy
      aktools:
        condition: service_healthy
    networks:
      - agentsstock-network

  # 起涨预测 paper-tracking 每日 sidecar：复用主应用镜像，每天 20:30
  # （kline 18:00 / chanlun 20:00 之后）跑 qizhang_batch，写 data/qizhang_picks.db，
  # 供「📈 起涨预测」页只读。纯观察,不下单/不发邮件。
  qizhang-updater:
    image: aiagents-stock-app
    container_name: qizhang-updater
    logging: *default-logging
    command: ["sh", "/app/qizhang_schedule.sh"]
    environment:
      - TZ=Asia/Shanghai
      - LOCAL_DB_DIR=/app/tdx-data/database/kline
      - QIZHANG_RUN_AT=20:30
    volumes:
      - ./data:/app/data                 # 写 qizhang_picks.db / qizhang_update.log
      - ./.env:/app/.env
      - ./tdx-data:/app/tdx-data:ro      # 只读本地K线（route B）
      - ./qizhang_schedule.sh:/app/qizhang_schedule.sh:ro
    healthcheck:
      disable: true
    restart: unless-stopped
    depends_on:
      tdx-stock-web:
        condition: service_healthy
      aktools:
        condition: service_healthy
    networks:
      - agentsstock-network

networks:
  agentsstock-network:
    driver: bridge
